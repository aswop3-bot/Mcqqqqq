<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار المنظمات الدولية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .quiz-container {
            background-color: transparent;
            width: 100%;
            max-width: 800px;
        }
        .question-block {
            background-color: #fff;
            padding: 30px;
            margin-bottom: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-right: 5px solid #3498db;
        }
        h2 {
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background-color: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: right;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #f9f9f9;
            border-color: #ccc;
        }
        .option-btn:disabled {
            cursor: default;
        }
        /* الألوان المطلوبة */
        .correct {
            background-color: #ffd54f !important; /* اللون الأصفر للإجابة الصحيحة */
            color: #000 !important;
            border-color: #ffd54f !important;
            font-weight: bold;
        }
        .incorrect {
            background-color: #ef5350 !important; /* اللون الأحمر للإجابة الخاطئة */
            color: #fff !important;
            border-color: #ef5350 !important;
        }
        #submit-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            transition: background-color 0.3s;
        }
        #submit-btn:hover {
            background-color: #219150;
        }
        .score-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            display: none;
            margin-bottom: 40px;
        }
        .score-container h3 {
            font-size: 28px;
            color: #2c3e50;
            margin-top: 0;
        }
        #score-text {
            font-size: 32px;
            font-weight: bold;
            color: #27ae60;
            margin: 20px 0;
        }
        #details-text {
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        #retry-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        #retry-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="all-questions-container"></div>
        <button id="submit-btn" onclick="showScore()">إنهاء الاختبار وعرض النتيجة</button>
        <div class="score-container" id="score-container">
            <h3>النتيجة النهائية</h3>
            <div id="score-text"></div>
            <div id="details-text"></div>
            <button id="retry-btn" onclick="location.reload()">إعادة الاختبار</button>
        </div>
    </div>

    <script>
        const quizData = [
            { question: "تطورت فكرة التنظيم الدولي في مراحل:", options: ["ثلاثة", "اربعة", "خمسة", "ستة"], answer: "ثلاثة" },
            { question: "انطبع التنظيم الدولي بمظهرين هما:", options: ["الانتقال من مرحلة المؤتمرات الى مرحلة المنظمات وتزايد اختصاصاتها", "الانتقال من مرحلة المنظمات الدولية الى مرحلة المؤتمرات الدولية", "الانتقال من مرحلة ما قبل عصبة الأمم الى مرحلة عهد عصبة الأمم", "ليس مما سبق"], answer: "الانتقال من مرحلة المؤتمرات الى مرحلة المنظمات وتزايد اختصاصاتها" },
            { question: "يمكن تقسيم المراحل التي مر بها التنظيم الدولي من حيث التطور التاريخي الى:", options: ["مرحلتين", "ثلاث مراحل", "اربع مراحل", "خمس مراحل"], answer: "ثلاث مراحل" },
            { question: "انشأت كل من روسيا وبروسيا والنمسا \"التحالف المقدس\" في ١٦ أيلول سنة ١٨١٥ في ظل مرحلة:", options: ["قبل ميثاق الأمم المتحدة", "قبل عصبة الأمم", "بعد عصبة الأمم", "ليس مما ذكر"], answer: "قبل عصبة الأمم" },
            { question: "أنشأت كل من بروسيا وروسيا والنمسا .......... بهدف إقامة سلم دائم يكفل استقرار نظم الحكم فيها:", options: ["التحالف المعظم ۱۸۱۳", "التحالف المبجل ١٨١٤", "التحالف المقدس ۱۸۱۵", "التحالف المبارك ١٨١٦"], answer: "التحالف المقدس ۱۸۱۵" },
            { question: "أنشأت كل من روسيا وبروسيا والنمسا ما يسمى بالتحالف المقدس بهدف إقامة سلم دائم ... يضم جميع الأوربيين عدا:", options: ["فرنسا", "بريطانيا", "اسبانيا", "رومانيا"], answer: "بريطانيا" },
            { question: "يرى فقهاء القانون الدولي ان اول تجربة للتنظيم الدولي تتمثل في انشاء ......... عام ١٨١٥:", options: ["تحالف المقدس", "نظام الوفاق الأوربي", "جامعة الدول العربية", "عهد عصبة الأمم"], answer: "نظام الوفاق الأوربي" },
            { question: "تعود نشأت نظام الوفاق الأوربي الى مرحلة ......... التي تعد من مراحل التطور التاريخي للتنظيم الدولي:", options: ["ما بعد عصبة الأمم", "ما قبل عصبة الأمم", "عهد عصبة الأمم", "ميثاق الأمم المتحدة"], answer: "ما قبل عصبة الأمم" },
            { question: "التجربة الأولى للتنظيم الدولي الحديث تمثلت بأنشاء نظام الوفاق الأوربي عام ۱۸۱۵ وكان لهذا النظام اهداف منها:", options: ["إيجاد مؤتمر لتحقيق مصالح ووحدة الدول الأوربية", "منع نشوء الحرب في القارة الأوربية", "المحافظة على سلام اوربا والعالم", "كل مما ذكر"], answer: "كل مما ذكر" },
            { question: "يعد المؤتمر لاهاي الأول والثاني للسلام العلامة البارزة في انماء الجهود الجماعية لاقامة نظام:", options: ["اوربي", "دولي واوربي", "وطني ودولي", "دولي"], answer: "دولي واوربي" },
            { question: "عدد الدول التي حضرت مؤتمر لاهاي للسلام الأول والثاني هي:", options: ["٢٦ دولة اوربية للمؤتمر الأول و ٤٤ دولة اوربية وامريكية للمؤتمر الثاني", "٤٤ دولة أمريكية للمؤتمر الثاني و ٢٦ دولة اوربية للمؤتمر الأول", "٤٤ دولة اوربية للمؤتمر الثاني و ٢٦ دولة اوربية للمؤتمر الأول", "ليس مما ذكر"], answer: "٢٦ دولة اوربية للمؤتمر الأول و ٤٤ دولة اوربية وامريكية للمؤتمر الثاني" },
            { question: "اسفر مؤتمر لاهاي الأول عام ۱۸۹۹ والثاني عام ۱۹۰۷ عن صياغة عدد من الاتفاقيات الدولية المتعلقة بـ:", options: ["قوانين الحرب الجوية", "قوانين الحرب البرية والجوية", "قوانين الحرب البرية", "قوانين الحرب البرية والبحرية"], answer: "قوانين الحرب البرية والبحرية" },
            { question: "في القرن التاسع عشر ظهرت عدد من المنظمات ذات الصفة ......:", options: ["الفنية", "القانونية", "الشخصية", "الموضوعية"], answer: "الفنية" },
            { question: "شهد القرن التاسع عشر ظهور بعض المنظمات ذات الصفة الفنية منها:", options: ["لجنة نهر البو ١٨٤٩", "لجنة نهر الدور ١٨٣٥", "لجنة الدانوب عام ١٨٥٦", "كل مما ذكر"], answer: "كل مما ذكر" },
            { question: "ما هو الهدف الرئيسي الذي سعت لتحقيقه منظمة (عصبة الأمم) بعد الحرب العالمية الأولى (١٩١٤-١٩١٨)؟", options: ["الحد من التسلح", "تحقيق الأمن والسلام لجميع الدول", "إحلال نظام الأمن الجماعي محل نظام الامن الفردي", "كل مما ذكر"], answer: "كل مما ذكر" },
            { question: "تم إقرار عهد عصبة الأمم المتحدة من قبل لجنة بريطانية أمريكية مشتركة في مؤتمر فرساي عام ۱۹۱۹ وتسمى هذه اللجنة بـ......:", options: ["لجنة القانون الدولي", "لجنة التحقيق", "هيرست - ملر", "فرانسيسكو"], answer: "هيرست - ملر" },
            { question: "تم انشاء عهد عصبة الأمم المتحدة في عام....... في مؤتمر فرساي:", options: ["۱۹۱۹", "۱۹۹۰", "١٩٤٥", "١٩٥٤"], answer: "۱۹۱۹" },
            { question: "تم اعداد عهد عصبة الأمم من قبل لجنة بريطانية أمريكية مشتركة تسمى لجنة (هيرست - ملر) واقراره في.........:", options: ["مؤتمر فرساي عام ۱۹۱۹", "مؤتمر فيينا ١٨١٥", "مؤتمر جنيف ۱۹۰۷", "مؤتمر لاهاي ۱۸۹۹"], answer: "مؤتمر فرساي عام ۱۹۱۹" },
            { question: "ان عدد مواد عهد عصبة الأمم المتحدة هي ....... مادة بالإضافة الى الديباجة:", options: ["۱۱۰", "٦٢", "١٦", "٢٦ مادة"], answer: "٢٦ مادة" },
            { question: "تعتبر ....... اول منظمة سياسية دولية ذات طابع عالمي تتمتع بالشخصية القانونية المستقلة والنواة الأولى للمنظمات الدولية:", options: ["منظمة الطيران المدني", "ميثاق الأمم المتحدة", "عهد عصبة الأمم", "جامعة الدول العربية"], answer: "عهد عصبة الأمم" },
            { question: "تعتبر عصبة الأمم اول منظمة ..:", options: ["دولية ذات طابع عالمي تتمتع بالشخصية القانونية المستقلة", "سياسية", "حكومية", "كل مما ذكر"], answer: " سياسية " },
            { question: "السبب الذي أدى الى فشل عصبة الأمم المتحدة رغم انها تنظيم دولي عالمي:", options: ["عدم امتلاكها قوة عسكرية", "اشتراط الاجماع وعدم وجود أداة تنفيذية", "اعتماد مبدأ الأغلبية", "ليس مما ذكر"], answer: "اشتراط الاجماع وعدم وجود أداة تنفيذية" },
            { question: "من الاسباب التي أدت الى فشل عصبة الأمم ونهايتها:", options: ["نظام تصويتها معقد", "عدم امتلاكها للأداة التنفيذية التي تجبر الدول على احترام قراراتها", "عدم اندماجها في اتفاقيات الصلح", "تحريمها للتهديد بالحرب"], answer: "عدم امتلاكها للأداة التنفيذية التي تجبر الدول على احترام قراراتها" },
            { question: "تصدر قرارات عهد عصبة الأمم المتحدة بـ:", options: ["بالأغلبية البسيطة", "بالأغلبية المطلقة", "بالأجماع", "بالأجماع او الأغلبية"], answer: "بالأجماع" },
            { question: "من المبادئ التي اتفق عليها دول الحلفاء لأنشاء ميثاق الأمم المتحدة بعد فشل عصبة الأمم:", options: ["مبدأ المساواة بين الدول", "مبدأ الاستقرار الدولي", "مبدأ الأمن الجماعي والتعايش السلمي ومبدأ نبذ الحروب", "ليس مما ذكر"], answer: "مبدأ الأمن الجماعي والتعايش السلمي ومبدأ نبذ الحروب" },
            { question: "المؤتمر الدولي الذي تم بموجبه المصادقة على ميثاق الأمم المتحدة عام ١٩٤٥ يسمى بمؤتمر:", options: ["يالطا", "بوتسدام", "سان فرانسيسكو", "موسكو"], answer: "سان فرانسيسكو" },
            { question: "تمت المصادقة على ميثاق ليصبح نفاذاً في مؤتمر سان فرانسيسكو لعام:", options: ["١٩٤٥", "١٩٤٦", "١٩٤٧", "١٩٤٨"], answer: "١٩٤٥" },
            { question: "أقر ميثاق الأمم المتحدة بعد فشل عهد عصبة الأمم مبدأ:", options: ["الاعتراف للدول الكبرى بمسؤولية المحافظة على السلم والأمن الدولي", "عدم اباحة الحرب او التهديد بها الا للدفاع الشرعي", "التصويت بالأغلبية بدلا من الاجماع", "كل مما ذكر"], answer: "كل مما ذكر" },
            { question: "من خصائص التنظيم الدولي تكون العضوية في المنظمات الدولية:", options: ["اختيارية", "اجبارية", "اجبارية واختيارية", "انضماميه"], answer: "اختيارية" },
            { question: "من خصائص النظام الدولي ان العضوية في المنظمات هي عضوية اختيارية 'ما الذي يجعلها اختيارية'؟", options: ["لان المنظمة الدولية تعد حكومة عليا", "لان التعامل الدولي قائم على رضا الدول المؤسسة للمنظمات", "لان المنظمة الدولية لا تعد حكومة عليا", "ليس مما ذكر"], answer: "لان التعامل الدولي قائم على رضا الدول المؤسسة للمنظمات" },
            { question: "خصائص التنظيم الدولي هي:", options: ["تحقيق مصالح مشتركة بين الدول ذات السيادة", "الاهتمام بالمصالح المشتركة الجماعية", "وجود أجهزة ذات السلطات", "كل مما تم ذكره"], answer: "كل مما تم ذكره" },
            { question: "من خصائص التنظيم الدولي تحقيق مصالح مشتركة عن طريق التعاون ...... بين الدول ذات السيادة:", options: ["الاختياري", "الاجباري", "الالزامي", "الاضطراري"], answer: "الاختياري" },
            { question: "يعد المصدر الأول والرئيس الأساسي لقانون المنظمات الدولية:", options: ["القواعد العرفية المكتوبة", "اللوائح الداخلية", "قواعد القانون الدولي", "المعاهدات والاتفاقيات الدولية"], answer: "المعاهدات والاتفاقيات الدولية" },
            { question: "ان المصادر الأساسية لقانون المنظمات الدولية هي:", options: ["المعاهدات والاتفاقيات الدولية", "اللوائح الداخلية التي تضعها المنظمات", "قواعد القانون الدولي العامة", "كل مما ذكر"], answer: "كل مما ذكر" },
            { question: "تعد ...... من مصادر قانون المنظمات الدولية:", options: ["اللوائح الدولية التي تضعها المنظمات", "احكام المحاكم الإدارية", "الأعراف المستمدة من نشاط الأجهزة الدولية", "كل مما ذكر"], answer: "الأعراف المستمدة من نشاط الأجهزة الدولية" },
            { question: "لا يعد من المصادر الأساسية لقانون المنظمات الدولية:", options: ["احكام المحاكم الدولية", "المعاهدات الدولية", "العرف الدولي", "الفقه الدولي"], answer: "الفقه الدولي" },
            { question: "من اهداف التنظيم الدولي, تحقيق التعاون والتضامن بين الدول لتحقيق مصالحها المشتركة وتحقيق ما يسمى بـ.......:", options: ["الامن التضامني", "الامن التعاوني والتضامني", "الامن المشترك", "الأمن الجماعي"], answer: "الأمن الجماعي" },
            { question: "في ظل القانون الدولي التقليدي كانت الحرب امراً:", options: ["غير مشروعة", "مشروعة", "وسيلة لحل المنازعة الدولية", "مشروعة ووسيلة لحل المنازعة الدولية"], answer: "مشروعة ووسيلة لحل المنازعة الدولية" },
            { question: "فرض عهد عصبة الأمم المتحدة على الدول قيوداً قبل اللجوء الى الحرب... ومن يتجاوز هذه القيود يوقع عليه جزاء متمثل بـ:", options: ["جزاء تأديبي كالطرد من العصبة", "جزاء اقتصادي", "جزاء حربي", "جزاء تأديبي واقتصادي وحربي"], answer: "جزاء تأديبي واقتصادي وحربي" },
            { question: "الدوافع الأولى لأعمال التنظيم الدولي هو العمل على:", options: ["تجنب او تخفيف المشكلات الاقتصادية بين الدول", "نبذ الحروب", "تحقيق مصالح مشتركة", "تجنب او تخفيف المشكلات الاجتماعية"], answer: "تجنب او تخفيف المشكلات الاجتماعية" },
            { question: "تحقيق التعاون في المجالات الاقتصادية والاجتماعية يمثل هدفاً له الأولوية في التنظيمات الدولية التي يغلب عليها:", options: ["الطابع الاجتماعي", "الطابع الاقتصادي", "الطابع السياسي", "الطابع الاجتماعي والاقتصادي"], answer: "الطابع السياسي" },
            { question: "عهد الى ...... مهمة توثيق التعاون الدولي في الشؤون الاقتصادية والاجتماعية والمالية والصحية والفكرية:", options: ["ميثاق الأمم المتحدة", "عصبة الأمم", "مجلس الامن", "لجنة القانون الدولي"], answer: "عصبة الأمم" },
            { question: "من مقاصد ميثاق الأمم المتحدة وفقاً لنص المادة الأولى من الميثاق هو:", options: ["تحقيق التعاون الدولي لحل المسائل الدولية", "عدم التمييز بسبب الجنس أو اللغة", "احترام حقوق الانسان وحماية الحريات", "جميع مما تم ذكره"], answer: "جميع مما تم ذكره" },
            { question: "من أجهزة الأمم المتحدة التي أعطيت لها مهمة الربط بين منظمة الأمم المتحدة والمنظمات المتخصصة:", options: ["محكمة العدل الدولية", "الجمعية العامة", "المجلس الاقتصادي والاجتماعي", "مجلس الامن الدولي"], answer: "المجلس الاقتصادي والاجتماعي" },
            { question: "اقتصرت عضوية الجماعة الدولية في اول الامر على الدول الأوربية:", options: ["المسيحية", "غير المسيحية", "المسيحية وغير المسيحية", "ليس مما ذكر"], answer: "المسيحية" },

        ];

        let score = 0;
        const container = document.getElementById("all-questions-container");

        function loadAllQuestions() {
            quizData.forEach((currentQuizData, index) => {
                const questionDiv = document.createElement("div");
                questionDiv.className = "question-block";
                questionDiv.innerHTML = `<h2>${index + 1}. ${currentQuizData.question}</h2>`;

                const optionsDiv = document.createElement("div");
                
                currentQuizData.options.forEach(option => {
                    const button = document.createElement("button");
                    button.innerText = option;
                    button.classList.add("option-btn");
                    button.onclick = () => selectAnswer(button, option, currentQuizData.answer, optionsDiv);
                    optionsDiv.appendChild(button);
                });

                questionDiv.appendChild(optionsDiv);
                container.appendChild(questionDiv);
            });
        }

        function selectAnswer(selectedButton, selectedOption, correctAnswer, optionsContainer) {
            if (optionsContainer.classList.contains("answered")) return;
            optionsContainer.classList.add("answered");

            const allButtons = optionsContainer.querySelectorAll(".option-btn");
            
            allButtons.forEach(btn => btn.disabled = true);

            if (selectedOption === correctAnswer) {
                selectedButton.classList.add("correct");
                score++;
            } else {
                selectedButton.classList.add("incorrect");
                allButtons.forEach(btn => {
                    if (btn.innerText === correctAnswer) {
                        btn.classList.add("correct");
                    }
                });
            }
        }

        function showScore() {
            const submitBtn = document.getElementById("submit-btn");
            const scoreContainer = document.getElementById("score-container");
            const scoreText = document.getElementById("score-text");
            const detailsText = document.getElementById("details-text");

            submitBtn.style.display = "none";
            scoreContainer.style.display = "block";

            const percentage = Math.round((score / quizData.length) * 100);
            
            scoreText.innerText = `%${percentage}`;
            detailsText.innerText = `أجبت بشكل صحيح على ${score} من أصل ${quizData.length} أسئلة.`;

            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        loadAllQuestions();
