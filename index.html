<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار المنظمات الدولية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* تغيير لكي تبدأ الصفحة من الأعلى */
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .quiz-container {
            background-color: transparent;
            width: 100%;
            max-width: 800px; /* توسيع العرض قليلاً ليناسب القراءة المريحة */
        }
        .question-block {
            background-color: #fff;
            padding: 30px;
            margin-bottom: 25px; /* مسافة بين كل سؤال وآخر */
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-right: 5px solid #3498db; /* لمسة جمالية بجانب السؤال */
        }
        h2 {
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background-color: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: right;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #f9f9f9;
            border-color: #ccc;
        }
        .option-btn:disabled {
            cursor: default;
        }
        /* الألوان عند الإجابة */
        .correct {
            background-color: #ffd54f !important; /* اللون الأصفر للإجابة الصحيحة */
            color: #000 !important;
            border-color: #ffd54f !important;
            font-weight: bold;
        }
        .incorrect {
            background-color: #ef5350 !important; /* اللون الأحمر للإجابة الخاطئة */
            color: #fff !important;
            border-color: #ef5350 !important;
        }
        #submit-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            transition: background-color 0.3s;
        }
        #submit-btn:hover {
            background-color: #219150;
        }
        .score-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            display: none; /* مخفي حتى يضغط المستخدم على عرض النتيجة */
            margin-bottom: 40px;
        }
        .score-container h3 {
            font-size: 28px;
            color: #2c3e50;
            margin-top: 0;
        }
        #score-text {
            font-size: 32px;
            font-weight: bold;
            color: #27ae60;
            margin: 20px 0;
        }
        #details-text {
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        #retry-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        #retry-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="all-questions-container"></div>
        
        <button id="submit-btn" onclick="showScore()">إنهاء الاختبار وعرض النتيجة</button>
        
        <div class="score-container" id="score-container">
            <h3>نتيجتك النهائية</h3>
            <div id="score-text"></div>
            <div id="details-text"></div>
            <button id="retry-btn" onclick="location.reload()">إعادة الاختبار</button>
        </div>
    </div>

    <script>
        // مصفوفة الأسئلة
        const quizData = [
            {
                question: "يمكن تقسيم المراحل التي مر بها التنظيم الدولي من حيث التطور التاريخي الى:",
                options: ["مرحلتين", "ثلاث مراحل", "اربع مراحل", "خمس مراحل"],
                answer: "ثلاث مراحل"
            },
            {
                question: "أنشأت كل من بروسيا وروسيا والنمسا .......... بهدف إقامة سلم دائم يكفل استقرار نظم الحكم فيها:",
                options: ["التحالف المعظم ۱۸۱۳", "التحالف المبجل ١٨١٤", "التحالف المقدس ۱۸۱۵", "التحالف المبارك ١٨١٦"],
                answer: "التحالف المقدس ۱۸۱۵"
            },
            {
                question: "يعد المؤتمر لاهاي الأول والثاني للسلام العلامة البارزة في انماء الجهود الجماعية لاقامة نظام:",
                options: ["وطني", "اوربي", "دولي واوربي", "دولي"],
                answer: "دولي"
            },
            {
                question: "ما هو الهدف الرئيسي الذي سعت لتحقيقه منظمة (عصبة الأمم) بعد الحرب العالمية الأولى؟",
                options: ["الحد من التسلح", "منع استخدام القوة لحل المنازعات", "تحقيق الأمن والسلام لجميع الدول", "كل مما ذكر"],
                answer: "كل مما ذكر"
            },
            {
                question: "ان عدد مواد عهد عصبة الأمم المتحدة هي ....... مادة بالإضافة الى الديباجة:",
                options: ["١٦", "٢٦ مادة", "٦٢", "۱۱۰"],
                answer: "٢٦ مادة"
            }
        ];

        let score = 0;
        const container = document.getElementById("all-questions-container");

        // دالة لتحميل وعرض جميع الأسئلة دفعة واحدة
        function loadAllQuestions() {
            quizData.forEach((currentQuizData, index) => {
                // إنشاء مربع السؤال
                const questionDiv = document.createElement("div");
                questionDiv.className = "question-block";
                questionDiv.innerHTML = `<h2>${index + 1}. ${currentQuizData.question}</h2>`;

                // حاوية الخيارات لهذا السؤال
                const optionsDiv = document.createElement("div");
                
                // إنشاء أزرار الخيارات
                currentQuizData.options.forEach(option => {
                    const button = document.createElement("button");
                    button.innerText = option;
                    button.classList.add("option-btn");
                    button.onclick = () => selectAnswer(button, option, currentQuizData.answer, optionsDiv);
                    optionsDiv.appendChild(button);
                });

                questionDiv.appendChild(optionsDiv);
                container.appendChild(questionDiv);
            });
        }

        // دالة التحقق من الإجابة عند الضغط عليها
        function selectAnswer(selectedButton, selectedOption, correctAnswer, optionsContainer) {
            // التأكد من عدم الإجابة على السؤال مسبقاً
            if (optionsContainer.classList.contains("answered")) return;
            optionsContainer.classList.add("answered");

            const allButtons = optionsContainer.querySelectorAll(".option-btn");
            
            // إيقاف تفعيل الأزرار لهذا السؤال فقط
            allButtons.forEach(btn => btn.disabled = true);

            // التحقق من الإجابة
            if (selectedOption === correctAnswer) {
                selectedButton.classList.add("correct");
                score++;
            } else {
                selectedButton.classList.add("incorrect");
                // البحث عن الإجابة الصحيحة وتلوينها بالأصفر
                allButtons.forEach(btn => {
                    if (btn.innerText === correctAnswer) {
                        btn.classList.add("correct");
                    }
                });
            }
        }

        // دالة عرض النتيجة النهائية من 100
        function showScore() {
            const submitBtn = document.getElementById("submit-btn");
            const scoreContainer = document.getElementById("score-container");
            const scoreText = document.getElementById("score-text");
            const detailsText = document.getElementById("details-text");

            submitBtn.style.display = "none";
            scoreContainer.style.display = "block";

            // حساب النسبة المئوية
            const percentage = Math.round((score / quizData.length) * 100);
            
            scoreText.innerText = `%${percentage}`;
            detailsText.innerText = `لقد أجبت بشكل صحيح على ${score} من أصل ${quizData.length} أسئلة.`;

            // النزول برؤية الشاشة للأسفل حيث توجد النتيجة
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // تشغيل دالة تحميل الأسئلة عند فتح الصفحة
        loadAllQuestions();
    </script>
</body>
</html>
