<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار المنظمات الدولية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .quiz-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h2 {
            font-size: 22px;
            line-height: 1.5;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background-color: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: right;
        }
        .option-btn:hover {
            background-color: #f9f9f9;
            border-color: #ccc;
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
        /* التنسيق المطلوب للإجابات */
        .correct {
            background-color: #ffd54f !important; /* لون أصفر للإجابة الصحيحة */
            color: #000 !important;
            border-color: #ffd54f !important;
            font-weight: bold;
        }
        .incorrect {
            background-color: #ef5350 !important; /* لون أحمر للإجابة الخاطئة */
            color: #fff !important;
            border-color: #ef5350 !important;
        }
        #next-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            display: none; /* مخفي حتى يتم اختيار إجابة */
            width: 100%;
        }
        #next-btn:hover {
            background-color: #2980b9;
        }
        .score-container {
            text-align: center;
            display: none;
        }
        .score-container h3 {
            font-size: 24px;
            color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="quiz-container" id="quiz">
        <div id="question-container">
            <h2 id="question">جاري تحميل السؤال...</h2>
            <div id="options">
                </div>
        </div>
        <button id="next-btn" onclick="nextQuestion()">السؤال التالي</button>
        
        <div class="score-container" id="score-container">
            <h3>انتهى الاختبار!</h3>
            <p id="score-text"></p>
            <button id="next-btn" style="display:block;" onclick="location.reload()">إعادة الاختبار</button>
        </div>
    </div>

    <script>
        // مصفوفة الأسئلة - يمكنك إضافة بقية الأسئلة هنا بنفس التنسيق
        const quizData = [
            {
                question: "يمكن تقسيم المراحل التي مر بها التنظيم الدولي من حيث التطور التاريخي الى:",
                options: ["مرحلتين", "ثلاث مراحل", "اربع مراحل", "خمس مراحل"],
                answer: "ثلاث مراحل"
            },
            {
                question: "أنشأت كل من بروسيا وروسيا والنمسا .......... بهدف إقامة سلم دائم يكفل استقرار نظم الحكم فيها:",
                options: ["التحالف المعظم ۱۸۱۳", "التحالف المبجل ١٨١٤", "التحالف المقدس ۱۸۱۵", "التحالف المبارك ١٨١٦"],
                answer: "التحالف المقدس ۱۸۱۵"
            },
            {
                question: "يعد المؤتمر لاهاي الأول والثاني للسلام العلامة البارزة في انماء الجهود الجماعية لاقامة نظام:",
                options: ["وطني", "اوربي", "دولي واوربي", "دولي"],
                answer: "دولي"
            },
            {
                question: "ما هو الهدف الرئيسي الذي سعت لتحقيقه منظمة (عصبة الأمم) بعد الحرب العالمية الأولى؟",
                options: ["الحد من التسلح", "منع استخدام القوة لحل المنازعات", "تحقيق الأمن والسلام لجميع الدول", "كل مما ذكر"],
                answer: "كل مما ذكر"
            },
            {
                question: "ان عدد مواد عهد عصبة الأمم المتحدة هي ....... مادة بالإضافة الى الديباجة:",
                options: ["١٦", "٢٦ مادة", "٦٢", "۱۱۰"],
                answer: "٢٦ مادة"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        const questionEl = document.getElementById("question");
        const optionsEl = document.getElementById("options");
        const nextBtn = document.getElementById("next-btn");
        const quizContainer = document.getElementById("question-container");
        const scoreContainer = document.getElementById("score-container");
        const scoreText = document.getElementById("score-text");

        function loadQuestion() {
            // تفريغ الخيارات السابقة
            optionsEl.innerHTML = "";
            nextBtn.style.display = "none";

            const currentQuizData = quizData[currentQuestionIndex];
            questionEl.innerText = `${currentQuestionIndex + 1}. ${currentQuizData.question}`;

            // إنشاء أزرار الخيارات
            currentQuizData.options.forEach(option => {
                const button = document.createElement("button");
                button.innerText = option;
                button.classList.add("option-btn");
                button.onclick = () => selectAnswer(button, option, currentQuizData.answer);
                optionsEl.appendChild(button);
            });
        }

        function selectAnswer(selectedButton, selectedOption, correctAnswer) {
            const allButtons = document.querySelectorAll(".option-btn");
            
            // إيقاف تفعيل الأزرار بعد الاختيار
            allButtons.forEach(btn => btn.disabled = true);

            // التحقق من الإجابة
            if (selectedOption === correctAnswer) {
                selectedButton.classList.add("correct");
                score++;
            } else {
                selectedButton.classList.add("incorrect");
                // البحث عن الزر الذي يحتوي على الإجابة الصحيحة وتلوينه بالأصفر
                allButtons.forEach(btn => {
                    if (btn.innerText === correctAnswer) {
                        btn.classList.add("correct");
                    }
                });
            }

            // إظهار زر الانتقال للسؤال التالي
            nextBtn.style.display = "block";
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showScore();
            }
        }

        function showScore() {
            quizContainer.style.display = "none";
            nextBtn.style.display = "none";
            scoreContainer.style.display = "block";
            scoreText.innerText = `لقد أجبت بشكل صحيح على ${score} من أصل ${quizData.length} أسئلة.`;
        }

        // بدء الاختبار عند تحميل الصفحة
        loadQuestion();
    </script>
</body>
</html>
